name: wavo_crm_frontend
description: "Cross-platform production-ready CRM and WhatsApp helper app for Wavo CRM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0

  # Navigation & Routing
  go_router: ^10.0.0

  # Networking & REST queries
  dio: ^5.3.0
  retrofit: ^4.0.1

  # Functional & Utilities
  equatable: ^2.0.5
  intl: ^0.18.1
  google_fonts: ^6.1.0

  # Local DB Cache (Offline support)
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.0
  retrofit_generator: ^8.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
